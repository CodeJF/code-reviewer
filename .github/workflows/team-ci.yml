name: SL100 Team CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run python -m unittest discover -s tests -v
      - run: uv run eval_sl100_logs.py --output /tmp/sl100_eval_results.json
      - run: uv run eval_sl100_product.py --output /tmp/sl100_product_eval_results.json
      - run: RUNTIME_ENV_FILE=.env.example docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml config >/tmp/sl100-team-compose.yml
