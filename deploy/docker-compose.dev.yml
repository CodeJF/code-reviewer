name: ${DEV_COMPOSE_PROJECT_NAME:-sl100-dev}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sl100_team_dev
      POSTGRES_USER: sl100
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-sl100-local-development}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sl100 -d sl100_team_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_dev_data:
  redis_dev_data:
